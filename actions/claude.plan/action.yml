name: 'Claude planning turn'
description: 'One planning turn on an ask issue: reconcile state, propose or materialize a plan. Requires claudeToken and ghToken inputs (use infisical.secrets.scope first). Billed to the Claude Max subscription.'

inputs:
  bot:
    description: 'Machine-user login the workflow triggers on (the agent identity)'
    required: false
    default: 'gingur-bot'
  claudeToken:
    description: 'CLAUDE_CODE_OAUTH_TOKEN, scoped to this step'
    required: true
  ghToken:
    description: 'GH_BOT_PAT, scoped to this step'
    required: true
  turns:
    description: 'Max agent turns per run (cost bound)'
    required: false
    default: '50'
  model:
    description: 'Model (claude --model value). Planning defaults to the strongest tier; empty falls back to the account default.'
    required: false
    default: 'opus'
  issue:
    description: 'Ask issue number the turn acts on'
    required: true
  intent:
    description: 'EM intent for this turn: plan | approve | signoff (see prompt.md). Selects which job the turn does.'
    required: false
    default: 'plan'
  operator:
    description: 'Human login this turn serves; empty falls back to the event sender (repo owner when the sender is the bot)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Instructions
      id: instructions
      shell: bash
      run: |
        # Emits AGENT_MD/PLAN_MD/TURN_STARTED/CLAUDE_EXEC — rationale in claude.lib/turn.sh.
        . "${GITHUB_ACTION_PATH}/../claude.lib/turn.sh"
        turn_instructions PLAN_MD

    - name: Plan
      uses: anthropics/claude-code-action@v1
      env:
        GH_TOKEN: ${{ inputs.ghToken }}
      with:
        claude_code_oauth_token: ${{ inputs.claudeToken }}
        github_token: ${{ inputs.ghToken }}
        path_to_claude_code_executable: ${{ env.CLAUDE_EXEC }}
        prompt: |
          Run context:
          - Repository: ${{ github.repository }}
          - Ask issue: #${{ inputs.issue }}
          - Intent: ${{ inputs.intent }}
          - Your bot login: ${{ inputs.bot }}
          - Operator (the human this turn): ${{ inputs.operator || (github.event.sender.login != inputs.bot && github.event.sender.login || github.repository_owner) }}
          - Turn budget: ${{ inputs.turns }} agent turns (the --max-turns hard cap)

          ${{ env.PLAN_MD }}
        claude_args: |
          --dangerously-skip-permissions
          --max-turns ${{ inputs.turns }}
          ${{ inputs.model && format('--model {0}', inputs.model) || '' }}
          --append-system-prompt "${{ env.AGENT_MD }}"

    - name: Verify
      env:
        GH_TOKEN: ${{ github.token }}
        ISSUE: ${{ inputs.issue }}
        REPO: ${{ github.repository }}
        BOT: ${{ inputs.bot }}
      shell: bash
      run: |
        # Comment-contract check — rationale in claude.lib/turn.sh.
        . "${GITHUB_ACTION_PATH}/../claude.lib/turn.sh"
        turn_verify

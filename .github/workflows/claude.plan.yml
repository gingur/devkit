name: Plan
# run-name carries both correlation tokens for the hooks service
# (workflow_run.display_title): `[d:<uuid>]` is the primary token — the
# dispatch-ledger key for service-dispatched runs — and `#N` stays as the
# human display plus the hooks legacy fallback for manual `gh workflow run`
# dispatches. This run-name covers only devkit's own direct dispatch runs —
# consumer callers set their own.
run-name: "Plan #${{ inputs.issue }}${{ inputs.dispatch && format(' [d:{0}]', inputs.dispatch) || '' }}"

on:
  workflow_dispatch:
    inputs:
      issue:
        description: 'Ask issue number the turn acts on'
        type: string
        required: true
      intent:
        description: 'What the EM does this turn: plan (produce/refine the plan) | approve (materialize the plan into task sub-issues) | signoff (verify the objective is delivered across the tasks). The Driver/PM selects the intent per dispatch; approval is an explicit dispatch, not a panel tick.'
        type: string
        required: false
        default: 'plan'
      dispatch:
        description: 'Hooks-service dispatch id, surfaced in run-name for run correlation'
        type: string
        required: false
        default: ''
      operator:
        description: 'Human login for handoff; empty falls back to the event sender'
        type: string
        required: false
        default: ''
  workflow_call:
    inputs:
      issue:
        description: 'Ask issue number the turn acts on'
        type: string
        required: true
      intent:
        description: 'What the EM does this turn: plan (produce/refine the plan) | approve (materialize the plan into task sub-issues) | signoff (verify the objective is delivered across the tasks). The Driver/PM selects the intent per dispatch; approval is an explicit dispatch, not a panel tick.'
        type: string
        required: false
        default: 'plan'
      dispatch:
        description: 'Hooks-service dispatch id, surfaced in run-name for run correlation'
        type: string
        required: false
        default: ''
      operator:
        description: 'Human login for handoff; empty falls back to the event sender'
        type: string
        required: false
        default: ''
      bot:
        description: 'Machine-user login the agent runs as (the agent identity)'
        type: string
        required: false
        default: 'gingur-bot'
      turns:
        description: 'Max agent turns per run'
        type: string
        required: false
        default: '50'
      model:
        description: 'Model (claude --model value). Planning defaults to Opus; empty falls back to the account default.'
        type: string
        required: false
        default: 'opus'
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug'
        type: string
        required: false
        default: 'gingur'
      infisicalEnv:
        description: 'Infisical environment slug'
        type: string
        required: false
        default: 'preview'
      infisicalPath:
        description: 'Infisical secret folder path'
        type: string
        required: false
        default: '/infra/github'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: plan-${{ inputs.issue }}
  cancel-in-progress: false

jobs:
  plan:
    name: 'Plan ${{ github.event.repository.name }}#${{ inputs.issue }} (${{ inputs.intent }})'
    # No admission gate here: this workflow is compute plane only. The hooks
    # service gates admission before dispatching, and workflow_dispatch
    # requires write access — the same trust bar the retired assignment
    # trigger had.
    # vars.RUNNER covers devkit's own direct workflow_dispatch runs; in
    # workflow_call mode vars resolves against the calling repo, so callers
    # must pass `runner` explicitly.
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      ISSUE: ${{ inputs.issue }}
      # Intent selects the EM's job for this turn (plan | approve | signoff);
      # default 'plan' covers the workflow_dispatch/legacy path that omits it.
      INTENT: ${{ inputs.intent || 'plan' }}
      # The hooks service dispatches via the bot PAT, so the sender can be
      # the bot itself — fall back to the repo owner as the operator.
      OPERATOR: ${{ inputs.operator || (github.event.sender.login != (inputs.bot || 'gingur-bot') && github.event.sender.login || github.repository_owner) }}
    steps:
      # Label the issue claude-ask so the hooks service treats operator
      # replies as turn triggers from the first turn onward (task issues need
      # no enrollment — they are created with claude-task).
      - name: Enroll
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh label create claude-ask --repo "$REPO" \
            --description "agent ask issue — operator replies drive turns" \
            --color 1d76db || true
          gh issue edit "$ISSUE" --repo "$REPO" --add-label claude-ask

      - name: Checkout
        uses: actions/checkout@v6

      - name: Secrets
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity || vars.INFISICAL_IDENTITY }}
          project: ${{ inputs.infisicalProject || 'gingur' }}
          env: ${{ inputs.infisicalEnv || 'preview' }}
          path: ${{ inputs.infisicalPath || '/infra/github' }}

      - name: Plan
        uses: gingur/devkit/actions/claude.plan@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          turns: ${{ inputs.turns || '50' }}
          model: ${{ inputs.model || 'opus' }}
          issue: ${{ env.ISSUE }}
          intent: ${{ env.INTENT }}
          operator: ${{ env.OPERATOR }}

      # No action panel: approval is an explicit `approve` dispatch by the
      # Driver/PM, not a checkbox tick. The handoff still sweeps any stale
      # panels left on the issue and hands the issue back to the operator.
      - name: Handoff
        if: always()
        uses: gingur/devkit/actions/claude.handoff@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          operator: ${{ env.OPERATOR }}
          issue: ${{ env.ISSUE }}
          status: ${{ job.status }}
          turn: ${{ env.INTENT == 'signoff' && 'Sign-off' || (env.INTENT == 'approve' && 'Approval' || 'Planning') }}

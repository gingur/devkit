name: 'Fetch Infisical secrets'
description: 'Fetch secrets from Infisical via GitHub OIDC. Defaults to exporting them to the job environment (export: env, job-wide); set export: file to write a dotenv file at fileOutputPath instead, for callers that scope individual secrets to a single step rather than exporting job-wide. Requires id-token: write in the calling job.'

inputs:
  identity:
    description: 'Infisical machine identity UUID with OIDC trust for this repo'
    required: true
  audience:
    description: 'OIDC audience claim (must match the identity configuration)'
    required: false
    default: 'https://github.com/gingur'
  project:
    description: 'Infisical project slug (e.g., gingur)'
    required: true
  env:
    description: 'Infisical environment slug (e.g., public)'
    required: true
  path:
    description: 'Infisical secret folder path (e.g., /troyrhinehart/cloudflare)'
    required: true
  export:
    description: 'Export mode: env (job-wide GITHUB_ENV, default) or file (dotenv at fileOutputPath)'
    required: false
    default: 'env'
  fileOutputPath:
    description: 'Dotenv path to write when export is file'
    required: false
    default: '/.env'

runs:
  using: 'composite'
  steps:
    - name: Fetch secrets
      uses: Infisical/secrets-action@v1.0.16
      with:
        method: oidc
        identity-id: ${{ inputs.identity }}
        oidc-audience: ${{ inputs.audience }}
        project-slug: ${{ inputs.project }}
        env-slug: ${{ inputs.env }}
        secret-path: ${{ inputs.path }}
        export-type: ${{ inputs.export }}
        file-output-path: ${{ inputs.fileOutputPath }}

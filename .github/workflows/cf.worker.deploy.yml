name: Deploy Cloudflare Worker

on:
  workflow_call:
    inputs:
      node:
        description: 'Node.js version (optional override). Empty means read from .nvmrc.'
        type: string
        required: false
        default: ''
      pnpm:
        description: 'pnpm version (optional override). Empty means read from packageManager field.'
        type: string
        required: false
        default: ''
      build:
        description: 'Build command to run before deploy'
        type: string
        required: false
        default: 'pnpm build'
      cwd:
        description: 'Directory containing package.json + wrangler.toml'
        type: string
        required: false
        default: '.'
      env:
        description: 'Deployment target: production | preview. Validated by case guard; sets the GitHub Environment for this job and the wrangler --env.'
        type: string
        required: true
      worker:
        description: 'Override the deployed worker name (wrangler --name). Empty uses the config name.'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug (e.g., gingur-7xjq)'
        type: string
        required: true
      infisicalEnv:
        description: 'Infisical environment slug (e.g., production)'
        type: string
        required: true
      infisicalPath:
        description: 'Infisical secret folder path (e.g., /troyrhinehart)'
        type: string
        required: true
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: true
      rollbackWorkflow:
        description: "Filename of the consumer's workflow_dispatch rollback wrapper. Used only to build the rollback link/command in the PR version-record comment."
        type: string
        required: false
        default: 'rollback.yml'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  deploy:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: ${{ inputs.env }}
    steps:
      - name: Validate environment input
        shell: bash
        run: |
          case "${{ inputs.env }}" in
            production|preview) ;;
            *)
              echo "::error::environment must be one of: production, preview (got: '${{ inputs.env }}')"
              exit 1
              ;;
          esac

      - uses: actions/checkout@v6

      - uses: gingur/devkit/actions/node.setup@main
        with:
          node: ${{ inputs.node }}
          pnpm: ${{ inputs.pnpm }}

      - name: Install dependencies
        working-directory: ${{ inputs.cwd }}
        shell: bash
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: ${{ inputs.cwd }}
        shell: bash
        run: ${{ inputs.build }}

      # CF_API_TOKEN / CF_ACCOUNT_ID live only in Infisical (single source of truth).
      # To rotate them, see the "Secret rotation" runbook in the README.
      - name: Fetch CF credentials
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity }}
          project: ${{ inputs.infisicalProject }}
          env: ${{ inputs.infisicalEnv }}
          path: ${{ inputs.infisicalPath }}

      - name: Deploy
        id: deploy
        uses: gingur/devkit/actions/cf.worker.deploy@main
        with:
          cwd: ${{ inputs.cwd }}
          env: ${{ inputs.env }}
          worker: ${{ inputs.worker }}
          token: ${{ env.CF_API_TOKEN }}
          account: ${{ env.CF_ACCOUNT_ID }}

      # On a production push (squash-merged PR), record the deployed version on the
      # source PR so it doubles as a rollback index. Skipped for preview deploys
      # (event_name == pull_request) and direct pushes with no associated PR.
      - name: Resolve source PR
        id: pr
        if: ${{ github.event_name == 'push' && inputs.env == 'production' && steps.deploy.outputs.versionId != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });
            const pr = prs.find((p) => p.merged_at) || prs[0];
            if (!pr) {
              core.info('No source PR associated with this commit; skipping version record.');
              return;
            }
            core.setOutput('number', String(pr.number));

      - name: Record version on source PR
        if: ${{ steps.pr.outputs.number != '' }}
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cf-deploy
          number: ${{ steps.pr.outputs.number }}
          message: |
            ## 🚀 Deployed

            ### Version

            ```text
            ${{ steps.deploy.outputs.versionId }}
            ```

            ### Rollback

            <details>
            <summary>Instructions</summary>

            **CLI**

            ```bash
            gh workflow run ${{ inputs.rollbackWorkflow }} -f version=${{ steps.deploy.outputs.versionId }}
            ```

            **UI**

            1. Actions ▸ [Rollback](${{ github.server_url }}/${{ github.repository }}/actions/workflows/${{ inputs.rollbackWorkflow }})
            2. Run workflow
            3. Paste version

            </details>

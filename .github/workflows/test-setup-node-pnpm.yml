name: Test setup-node-pnpm

on:
  pull_request:
    paths:
      - 'actions/setup-node-pnpm/**'
      - '.github/workflows/test-setup-node-pnpm.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  with-inputs:
    name: With explicit version inputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./actions/setup-node-pnpm
        with:
          node-version: '20'
          pnpm-version: '9'
          install: 'false'
      - name: Show versions
        shell: bash
        run: |
          echo "node: $(node --version)"
          echo "pnpm: $(pnpm --version)"

  without-inputs:
    name: Without inputs (reads from files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stage .nvmrc and package.json fixture
        shell: bash
        run: |
          echo "20" > .nvmrc
          cat > package.json <<'JSON'
          {
            "name": "test-fixture",
            "private": true,
            "type": "module",
            "packageManager": "pnpm@9.0.0"
          }
          JSON
      - uses: ./actions/setup-node-pnpm
        with:
          install: 'false'
      - name: Show versions
        shell: bash
        run: |
          echo "node: $(node --version)"
          echo "pnpm: $(pnpm --version)"

name: 'Deploy Cloudflare Worker'
description: 'Run wrangler against a pre-built directory via cloudflare/wrangler-action@v4. Caller must export CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID on the calling step; they are forwarded to wrangler-action as inputs (v4 does not read them from the environment).'

inputs:
  working-directory:
    description: 'Directory containing wrangler.toml'
    required: false
    default: '.'
  environment:
    description: 'wrangler --env value. Empty means run without --env.'
    required: false
    default: ''
  command:
    description: 'wrangler subcommand'
    required: false
    default: 'deploy'

runs:
  using: 'composite'
  steps:
    - name: Deploy
      uses: cloudflare/wrangler-action@v4
      with:
        # wrangler-action@v4 takes credentials via inputs, not env vars — it
        # scrubs CLOUDFLARE_* from the environment before invoking wrangler.
        apiToken: ${{ env.CLOUDFLARE_API_TOKEN }}
        accountId: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        workingDirectory: ${{ inputs.working-directory }}
        environment: ${{ inputs.environment }}
        command: ${{ inputs.command }}

# Thin dispatch executor — devkit is a consumer of its own reusables. The
# hooks service dispatches turns by filename (plan.yml / implement.yml /
# review.yml), so this caller must exist here like in every enrolled repo.
name: Review
# run-name carries the PR number plus the [d:<uuid>] dispatch token the
# hooks service correlates completed runs by (workflow_run.display_title →
# dispatch ledger). Manual escape hatch: gh workflow run review.yml -f pr=<n>
# — omitting dispatch yields the legacy '#N' run-name, which the service's
# fallback correlation still handles.
run-name: "Review #${{ inputs.pr }}${{ inputs.dispatch && format(' [d:{0}]', inputs.dispatch) || '' }}"

on:
  workflow_dispatch:
    inputs:
      pr:
        description: 'Pull request number the turn reviews'
        type: string
        required: true
      dispatch:
        description: 'Hooks-service dispatch id, surfaced in run-name for run correlation'
        type: string
        required: false
        default: ''
      operator:
        description: 'Human login for handoff; empty falls back to the event sender'
        type: string
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

jobs:
  review:
    uses: ./.github/workflows/claude.review.yml
    with:
      pr: ${{ inputs.pr }}
      dispatch: ${{ inputs.dispatch }}
      operator: ${{ inputs.operator }}
      runner: ${{ vars.RUNNER }}

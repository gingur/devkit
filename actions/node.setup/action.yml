name: 'Setup Node + pnpm'
description: 'Install pnpm and Node.js with dependency caching. Versions default to .nvmrc (Node) and the package.json packageManager field (pnpm) when inputs are unset; pass an input to override.'

inputs:
  node:
    description: 'Node.js version. Optional override. When unset, reads from .nvmrc.'
    required: false
    default: ''
  pnpm:
    description: 'pnpm version. Optional override. When unset, reads from package.json packageManager field.'
    required: false
    default: ''
  install:
    description: 'Run pnpm install --frozen-lockfile after setup'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        version: ${{ inputs.pnpm }}

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node }}
        node-version-file: .nvmrc
        cache: 'pnpm'

    - name: Install dependencies
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm install --frozen-lockfile

    # Re-resolve the shared-config dep past the lockfile pin so CI always runs
    # against what the specifier names: `#main` → branch head (live), a SHA →
    # held back, `#semver:` tag → range-bounded. No-op when the dep is absent.
    - name: Refresh devkit
      if: ${{ inputs.install == 'true' }}
      shell: bash
      run: pnpm update @gingur/devkit

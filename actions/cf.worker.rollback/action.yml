name: 'Rollback Cloudflare Worker'
description: 'Roll a Worker back to a prior version via cloudflare/wrangler-action. Always passes --message so the rollback runs non-interactively. Cloudflare credentials are passed as inputs (it takes them via inputs, not environment variables).'

inputs:
  token:
    description: 'Cloudflare API token'
    required: true
  account:
    description: 'Cloudflare account ID'
    required: true
  cwd:
    description: 'Directory containing wrangler.toml'
    required: false
    default: '.'
  env:
    description: 'wrangler --env value. Empty means run without --env.'
    required: false
    default: ''
  worker:
    description: 'Override the worker name (wrangler --name). Empty uses the config name.'
    required: false
    default: ''
  version:
    description: 'Cloudflare version UUID to roll back to. Empty rolls back to the immediately-previous version.'
    required: false
    default: ''
  message:
    description: "Rollback message recorded in Cloudflare. Always sent, which skips wrangler's interactive confirmation prompt."
    required: false
    default: 'Rollback via gingur/devkit'

runs:
  using: 'composite'
  steps:
    - name: Rollback
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ inputs.token }}
        accountId: ${{ inputs.account }}
        workingDirectory: ${{ inputs.cwd }}
        environment: ${{ inputs.env }}
        command: ${{ inputs.worker == '' && format('rollback {0} --message "{1}"', inputs.version, inputs.message) || format('rollback {0} --name {1} --message "{2}"', inputs.version, inputs.worker, inputs.message) }}

name: 'Claude turn-end handoff'
description: 'End an agent workflow turn: hand off to the operator (re-assign the issue from the bot), sweep action panels on success, and, on any non-success status, post a failure comment that @mentions the operator. Guarantee hierarchy: the handoff and failure comment run on github.token unconditionally, so they survive an Infisical outage; panels are best-effort — the default panel is posted with the bot PAT (GH_BOT_PAT from the job env) so the hooks service can arm it, and is skipped when the PAT is absent. Requires issues: write in the calling job.'

inputs:
  bot:
    description: 'Machine-user login to unassign'
    required: true
  operator:
    description: 'Human login to assign and @mention'
    required: true
  status:
    description: "Calling job's status (callers pass the job.status expression)"
    required: true
  turn:
    description: 'Human word naming the turn kind for the comment text (e.g., Planning, Implementation)'
    required: true
  issue:
    description: 'Issue or PR number to hand off (PRs are issues to the assignee/comment/reactions APIs — review callers pass the PR number)'
    required: true
  panel:
    description: 'Markdown body for the default action-panel comment posted on success. Empty posts nothing; suppressed when the agent posted its own panel this turn.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Handoff
      env:
        GH_TOKEN: ${{ github.token }}
        ISSUE: ${{ inputs.issue }}
        REPO: ${{ github.repository }}
        BOT: ${{ inputs.bot }}
        OPERATOR: ${{ inputs.operator }}
      shell: bash
      run: |
        gh issue edit "$ISSUE" --repo "$REPO" \
          --remove-assignee "$BOT" --add-assignee "$OPERATOR"

    # Remove the bot's 👀 acknowledgements (added by the intake layer —
    # gingur/hooks — on the triggering comment) — the turn is over either
    # way, success or failure.
    # Reactions belong to the bot user, so removal needs the bot PAT (from the
    # job env, like Panels); best-effort when it's absent.
    - name: Unack
      env:
        ISSUE: ${{ inputs.issue }}
        REPO: ${{ github.repository }}
        BOT: ${{ inputs.bot }}
      shell: bash
      run: |
        [[ -z "${GH_BOT_PAT:-}" ]] && { echo 'GH_BOT_PAT absent — skipping ack cleanup'; exit 0; }
        export GH_TOKEN=$GH_BOT_PAT
        # Comment payloads carry reaction counts, so only comments actually
        # showing 👀 need the per-comment reactions lookup.
        for cid in $(gh api "repos/$REPO/issues/$ISSUE/comments" --paginate \
            --jq '.[] | select(.reactions.eyes > 0) | .id'); do
          for rid in $(gh api "repos/$REPO/issues/comments/$cid/reactions" \
              --jq ".[] | select(.content == \"eyes\" and .user.login == \"$BOT\") | .id"); do
            gh api -X DELETE "repos/$REPO/issues/comments/$cid/reactions/$rid" --silent || true
          done
        done

    # Action panels are the operator's one-tap controls — at most one live per
    # issue. Listing and neutralizing use github.token: PATCH keeps the original
    # author, and GITHUB_TOKEN events never trigger workflows (the hooks
    # service additionally ignores bot-sender events and bodies without
    # "- [x] "). Posting the default panel uses GH_BOT_PAT from the job env —
    # the panel must be bot-authored or the hooks service's panel-edit gate
    # can never arm it — and is best-effort:
    # no PAT (secrets fetch failed), no panel; operator replies still start
    # turns. The neutralize sweep is the mechanical backstop behind the agent's
    # semantic defusal — it guarantees no stale actionable surface survives
    # even if the model forgot.
    - name: Panels
      if: inputs.status == 'success'
      env:
        GH_TOKEN: ${{ github.token }}
        ISSUE: ${{ inputs.issue }}
        REPO: ${{ github.repository }}
        BOT: ${{ inputs.bot }}
        PANEL: ${{ inputs.panel }}
      shell: bash
      run: |
        marker='<!-- claude:action-panel -->'

        # Bot comments in creation order, one "<id><TAB><base64 body>" per line.
        list=$(gh api "repos/$REPO/issues/$ISSUE/comments" --paginate \
          --jq '.[] | select(.user.login == env.BOT) | "\(.id)\t\(.body | @base64)"')

        panels=()
        newest=''
        declare -A bodies
        while IFS=$'\t' read -r id b64; do
          [[ -z "$id" ]] && continue
          newest=$id
          body=$(printf '%s' "$b64" | base64 -d)
          # Anchored: a panel's body OPENS with the marker. A substring match
          # would classify any comment merely quoting the marker (e.g. a plan
          # describing how panels work) as a live panel — corrupting the sweep
          # and wrongly suppressing the default panel.
          if [[ "$body" == "$marker"* ]]; then
            panels+=("$id")
            bodies[$id]=$body
          fi
        done <<< "$list"

        # Newest bot comment is itself an active panel ⇒ the agent posted its
        # own this turn: keep it and suppress the default.
        keep=''
        if [[ ${#panels[@]} -gt 0 && "${panels[-1]}" == "$newest" ]]; then
          keep=$newest
        fi

        for id in "${panels[@]}"; do
          [[ "$id" == "$keep" ]] && continue
          closed=$(printf '%s\n' "${bodies[$id]}" | tr -d '\r' | sed \
            -e 's|<!-- claude:action-panel -->|<!-- claude:action-panel:done -->|' \
            -e '/^- \[ \] /d' \
            -e 's|^- \[x\] |✔ |')
          gh api -X PATCH "repos/$REPO/issues/comments/$id" --silent \
            -f body="$closed"$'\n\n_(panel closed)_'
        done

        if [[ -z "$keep" && -n "$PANEL" ]]; then
          if [[ -n "${GH_BOT_PAT:-}" ]]; then
            GH_TOKEN=$GH_BOT_PAT gh api "repos/$REPO/issues/$ISSUE/comments" --silent \
              -f body="$marker"$'\n\n'"$PANEL"
          else
            echo 'GH_BOT_PAT absent — skipping the default action panel; replies still start turns'
          fi
        fi

    - name: Report failure
      if: inputs.status != 'success'
      env:
        GH_TOKEN: ${{ github.token }}
        ISSUE: ${{ inputs.issue }}
        REPO: ${{ github.repository }}
        OPERATOR: ${{ inputs.operator }}
        STATUS: ${{ inputs.status }}
        TURN: ${{ inputs.turn }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      shell: bash
      run: |
        gh issue comment "$ISSUE" --repo "$REPO" --body "⚠️ @$OPERATOR **$TURN turn did not complete** (status: $STATUS). See the run log: $RUN_URL

        Fix the cause, then reply here (any reply starts a new turn) or re-assign the bot — turns are safe to repeat."

    # The one-tap counterpart to the failure comment above — same pattern as
    # Approve. Panels must be bot-authored or the hooks service's panel-edit
    # gate can never arm them, so this posts with GH_BOT_PAT and is best-effort: no PAT (a secrets
    # fetch failure may be the very thing that failed the turn), no panel; the
    # github.token comment above already carries the reply path.
    - name: Retry panel
      if: inputs.status != 'success'
      env:
        ISSUE: ${{ inputs.issue }}
        REPO: ${{ github.repository }}
        TURN: ${{ inputs.turn }}
      shell: bash
      run: |
        [[ -z "${GH_BOT_PAT:-}" ]] && { echo 'GH_BOT_PAT absent — skipping the retry panel; replies still start turns'; exit 0; }
        body=$(printf '<!-- claude:action-panel -->\n\n🎛️ **Your move**\n- [ ] **Retry** — tick to run the %s turn again' "${TURN,,}")
        GH_TOKEN=$GH_BOT_PAT gh api "repos/$REPO/issues/$ISSUE/comments" --silent -f body="$body"

name: 'List Cloudflare Worker versions'
description: 'List recent Worker versions via cloudflare/wrangler-action, for rollback discovery. Prints a ready-to-run rollback dispatch hint. Cloudflare credentials are passed as inputs.'

inputs:
  token:
    description: 'Cloudflare API token'
    required: true
  account:
    description: 'Cloudflare account ID'
    required: true
  cwd:
    description: 'Directory containing wrangler.toml'
    required: false
    default: '.'
  env:
    description: 'wrangler --env value. Empty means run without --env.'
    required: false
    default: ''
  worker:
    description: 'Override the worker name (wrangler --name). Empty uses the config name.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: List versions
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ inputs.token }}
        accountId: ${{ inputs.account }}
        workingDirectory: ${{ inputs.cwd }}
        environment: ${{ inputs.env }}
        command: ${{ inputs.worker == '' && 'versions list' || format('versions list --name {0}', inputs.worker) }}
    - name: Rollback hint
      shell: bash
      env:
        ENV: ${{ inputs.env }}
      run: |
        target="${ENV:-production}"
        echo "To roll back, dispatch the rollback workflow with a version ID from the list above:"
        echo "  gh workflow run cf.worker.rollback.yml -f env=${target} -f version=<id>"

name: Cleanup Cloudflare Worker preview

on:
  workflow_call:
    inputs:
      app:
        type: string
        required: true
      domain:
        type: string
        required: true
      cfZone:
        type: string
        required: true
      cwd:
        type: string
        required: false
        default: '.'
      infisicalProject:
        type: string
        required: true
      infisicalEnv:
        type: string
        required: true
      infisicalPath:
        type: string
        required: true
      infisicalIdentity:
        type: string
        required: true
      infisicalAudience:
        type: string
        required: false
        default: 'https://github.com/gingur'

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      WORKER: ${{ inputs.app }}-pr-${{ github.event.pull_request.number }}
      HOST: pr-${{ github.event.pull_request.number }}.${{ inputs.domain }}
    steps:
      - name: Require a pull_request event
        shell: bash
        run: |
          if [ -z "${{ github.event.pull_request.number }}" ]; then
            echo "::error::cf.worker.preview.cleanup must be called on a pull_request event (no PR number available)."
            exit 1
          fi

      - uses: actions/checkout@v6

      - name: Fetch CF credentials
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity }}
          audience: ${{ inputs.infisicalAudience }}
          project: ${{ inputs.infisicalProject }}
          env: ${{ inputs.infisicalEnv }}
          path: ${{ inputs.infisicalPath }}

      - name: Detach custom domain
        uses: gingur/devkit/actions/cf.worker.domain@main
        with:
          mode: detach
          token: ${{ env.CF_API_TOKEN }}
          account: ${{ env.CF_ACCOUNT_ID }}
          zone: ${{ inputs.cfZone }}
          hostname: ${{ env.HOST }}

      # No `env:` here on purpose: delete targets the worker by name across all
      # environments, so we run `wrangler delete --name <worker>` with no --env.
      - name: Delete preview worker
        uses: gingur/devkit/actions/cf.worker.deploy@main
        with:
          cwd: ${{ inputs.cwd }}
          token: ${{ env.CF_API_TOKEN }}
          account: ${{ env.CF_ACCOUNT_ID }}
          command: delete
          worker: ${{ env.WORKER }}

      - name: Remove preview comment
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: cf-preview
          delete: true

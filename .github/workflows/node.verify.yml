name: Verify

on:
  workflow_call:
    inputs:
      node:
        description: 'Node.js version (optional override). Empty means read from .nvmrc.'
        type: string
        required: false
        default: ''
      pnpm:
        description: 'pnpm version (optional override). Empty means read from packageManager field.'
        type: string
        required: false
        default: ''
      cwd:
        description: 'Directory containing package.json'
        type: string
        required: false
        default: '.'
      lint:
        description: 'pnpm script to run for lint'
        type: string
        required: false
        default: 'lint'
      typecheck:
        description: 'pnpm script to run for typecheck'
        type: string
        required: false
        default: 'typecheck'
      test:
        description: 'pnpm script to run for tests'
        type: string
        required: false
        default: 'test'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read

jobs:
  verify:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: ${{ inputs.cwd }}
    steps:
      - uses: actions/checkout@v6

      - uses: gingur/devkit/actions/node.setup@main
        with:
          node: ${{ inputs.node }}
          pnpm: ${{ inputs.pnpm }}

      - name: Lint
        run: pnpm ${{ inputs.lint }}

      - name: Typecheck
        run: pnpm ${{ inputs.typecheck }}

      - name: Test
        run: pnpm ${{ inputs.test }}

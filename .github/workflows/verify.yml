name: Verify
# devkit's own CI.
#
# Everything under actions/ ships to every enrolled repo on `@main`, so a
# regression here lands fleet-wide the moment it merges — there is no staging
# step between this repo and production. #147 changed the agent's comment
# identity and false-failed every plan/implement/review turn in every repo, and
# nothing caught it because this repo had no PR-triggered test job at all: the
# only workflow on `pull_request` was the secret scan.
#
# Runs GitHub-hosted by design (devkit standards: only operator-gated triggers
# may target the `local` self-hosted runner).
on:
  pull_request:
    paths:
      - 'actions/**'
      - '.github/workflows/verify.yml'
      - '.github/workflows/claude.*.yml'

permissions:
  contents: read

jobs:
  actions:
    name: Actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Catches the class of breakage that only shows up at turn time, when a
      # composite sources a lib whose syntax never got exercised locally.
      - name: Shell syntax
        run: |
          set -euo pipefail
          mapfile -t files < <(git ls-files 'actions/**/*.sh')
          printf 'checking %s shell file(s)\n' "${#files[@]}"
          for f in "${files[@]}"; do bash -n "$f"; done

      # Locks the agent comment-identity contract against fixtures — no network,
      # no token, real jq selectors. See
      # docs/incidents/2026-07-17-turn-guard-identity.md.
      - name: Turn contract fixtures
        run: bash actions/claude.lib/turn.test.sh

      # Locks the secret-scoping primitive against fixtures — no network, no
      # token. See actions/claude.lib/secrets.sh.
      - name: Secret scoping fixtures
        run: bash actions/claude.lib/secrets.test.sh

      # Static guard against job-wide secret exposure in agent-turn
      # workflows/composites — the class of bug behind devkit#168 (an
      # implement turn ran `env | grep database_url` and printed a live
      # DATABASE_URL into the Actions log because the turn's Secrets step
      # exported job-wide via GITHUB_ENV). Same evidence-before-failing
      # discipline as turn.sh: print what was found, then fail.
      - name: Secret hygiene
        run: |
          set -uo pipefail
          mapfile -t files < <(git ls-files '.github/workflows/claude.*.yml' 'actions/claude.*/action.yml')
          printf 'checking %s turn file(s):\n' "${#files[@]}"
          printf '  %s\n' "${files[@]}"

          fail=0
          report() { # <label> <grep output>
            echo
            echo "::error::$1"
            printf '%s\n' "$2"
            fail=1
          }

          hits=$(grep -nE 'export-type:\s*env|export:\s*env' "${files[@]}" || true)
          [[ -n "$hits" ]] && report "job-wide secret export found (use infisical.secrets.scope, not export: env)" "$hits"

          hits=$(grep -nE 'GITHUB_ENV' "${files[@]}" | grep -E 'GH_BOT_PAT|GH_DRIVER_PAT|CLAUDE_CODE_OAUTH_TOKEN|DATABASE_URL' || true)
          [[ -n "$hits" ]] && report "a known secret name is written to \$GITHUB_ENV (secrets must stay step-scoped)" "$hits"

          hits=$(grep -lE 'DATABASE_URL|databaseUrl' "${files[@]}" | grep -v 'reconcile' || true)
          [[ -n "$hits" ]] && report "DATABASE_URL/databaseUrl referenced outside claude.reconcile (only the reconcile turn does DB work)" "$hits"

          hits=$(grep -nE '(^|[^./$A-Za-z0-9_-])(env|printenv)(\s|$)|set -x' "${files[@]}" | grep -vE ':[0-9]+:\s*#' || true)
          [[ -n "$hits" ]] && report "a bare env/printenv invocation or 'set -x' found (can dump secrets into the Actions log)" "$hits"

          if [[ "$fail" -eq 0 ]]; then
            echo "secret hygiene: clean — no job-wide export, no secret written to \$GITHUB_ENV, no stray DATABASE_URL, no bare env/printenv/set -x"
          fi
          exit "$fail"

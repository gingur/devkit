name: 'Deploy Cloudflare Worker'
description: 'Run wrangler against a pre-built directory via cloudflare/wrangler-action@v4. Cloudflare credentials are passed as inputs (v4 takes them via inputs, not environment variables).'

inputs:
  api-token:
    description: 'Cloudflare API token'
    required: true
  account-id:
    description: 'Cloudflare account ID'
    required: true
  working-directory:
    description: 'Directory containing wrangler.toml'
    required: false
    default: '.'
  environment:
    description: 'wrangler --env value. Empty means run without --env.'
    required: false
    default: ''
  command:
    description: 'wrangler subcommand'
    required: false
    default: 'deploy'

runs:
  using: 'composite'
  steps:
    - name: Deploy
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ inputs.api-token }}
        accountId: ${{ inputs.account-id }}
        workingDirectory: ${{ inputs.working-directory }}
        environment: ${{ inputs.environment }}
        command: ${{ inputs.command }}

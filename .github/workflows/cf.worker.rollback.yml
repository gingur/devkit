name: Rollback Cloudflare Worker

on:
  workflow_call:
    inputs:
      version:
        description: 'Cloudflare version UUID to roll back to. Empty rolls back to the immediately-previous version.'
        type: string
        required: false
        default: ''
      cwd:
        description: 'Directory containing wrangler.toml'
        type: string
        required: false
        default: '.'
      worker:
        description: 'Override the worker name (wrangler --name). Empty uses the config name.'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug (e.g., gingur)'
        type: string
        required: true
      infisicalEnv:
        description: 'Infisical environment slug (e.g., public)'
        type: string
        required: true
      infisicalPath:
        description: 'Infisical secret folder path (e.g., /troyrhinehart/cloudflare)'
        type: string
        required: true
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: true
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  id-token: write

jobs:
  rollback:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    environment: production
    steps:
      - uses: actions/checkout@v6

      # CF_API_TOKEN / CF_ACCOUNT_ID live only in Infisical (single source of truth).
      - name: Fetch CF credentials
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity }}
          project: ${{ inputs.infisicalProject }}
          env: ${{ inputs.infisicalEnv }}
          path: ${{ inputs.infisicalPath }}

      - name: Rollback
        uses: gingur/devkit/actions/cf.worker.rollback@main
        with:
          cwd: ${{ inputs.cwd }}
          env: production
          worker: ${{ inputs.worker }}
          version: ${{ inputs.version }}
          token: ${{ env.CF_API_TOKEN }}
          account: ${{ env.CF_ACCOUNT_ID }}

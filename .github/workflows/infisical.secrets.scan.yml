# .github/workflows/infisical.secrets.scan.yml
name: Secret scan

on:
  workflow_call:
    inputs:
      config:
        description: 'Path to an infisical-scan.toml override (optional; defaults to devkit bundled config)'
        type: string
        required: false
        default: ''
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read

jobs:
  scan:
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history so the diff range resolves

      - uses: gingur/devkit/actions/infisical.secrets.scan@main
        with:
          config: ${{ inputs.config }}

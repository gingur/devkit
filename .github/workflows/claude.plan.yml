name: Plan
# run-name embeds the issue number so the hooks service can correlate the
# completed run (workflow_run.display_title) back to its issue for turn-end.
run-name: 'Plan #${{ github.event.issue.number }}'

on:
  issues:
    types: [assigned]
  workflow_call:
    inputs:
      bot:
        description: 'Machine-user login that triggers a turn when assigned'
        type: string
        required: false
        default: 'gingur-bot'
      turns:
        description: 'Max agent turns per run'
        type: string
        required: false
        default: '50'
      model:
        description: 'Model (claude --model value). Planning defaults to the strongest tier; empty falls back to the account default.'
        type: string
        required: false
        default: 'fable'
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug'
        type: string
        required: false
        default: 'gingur'
      infisicalEnv:
        description: 'Infisical environment slug'
        type: string
        required: false
        default: 'preview'
      infisicalPath:
        description: 'Infisical secret folder path'
        type: string
        required: false
        default: '/infra/github'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: plan-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan:
    name: 'Plan ${{ github.event.repository.name }}#${{ github.event.issue.number }}: ${{ github.event.issue.title }}'
    if: github.event.assignee.login == (inputs.bot || 'gingur-bot') && !contains(github.event.issue.labels.*.name, 'claude-task')
    # vars.RUNNER fallback: the direct issues:assigned trigger has no caller to
    # pass inputs; in workflow_call mode vars resolves against the calling repo.
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    steps:
      # Label the issue claude-ask so claude.wake.yml treats operator replies
      # as turn triggers from the first assignment onward (task issues need no
      # enrollment — they are created with claude-task).
      - name: Enroll
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          gh label create claude-ask --repo "$REPO" \
            --description "agent ask issue — operator replies drive turns" \
            --color 1d76db || true
          gh issue edit "$ISSUE" --repo "$REPO" --add-label claude-ask

      - name: Checkout
        uses: actions/checkout@v6

      - name: Secrets
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity || vars.INFISICAL_IDENTITY }}
          project: ${{ inputs.infisicalProject || 'gingur' }}
          env: ${{ inputs.infisicalEnv || 'preview' }}
          path: ${{ inputs.infisicalPath || '/infra/github' }}

      - name: Plan
        uses: gingur/devkit/actions/claude.plan@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          turns: ${{ inputs.turns || '50' }}
          model: ${{ inputs.model || 'fable' }}

      - name: Handoff
        if: always()
        uses: gingur/devkit/actions/claude.handoff@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          # Wake assigns via the bot PAT, so sender can be the bot itself —
          # fall back to the repo owner as the operator.
          operator: ${{ github.event.sender.login != (inputs.bot || 'gingur-bot') && github.event.sender.login || github.repository_owner }}
          status: ${{ job.status }}
          turn: Planning
          panel: |
            🎛️ **Your move**
            - [ ] **Approve** — tick to accept the plan; my next turn creates the tasks

            Ticking the box is the only way to approve. Any reply is discussion — it starts a revise/answer turn automatically. Prefix a comment with `[hold]` to comment without starting a turn.

name: 'Deploy Cloudflare Worker'
description: 'Run wrangler against a pre-built directory via cloudflare/wrangler-action. Cloudflare credentials are passed as inputs (it takes them via inputs, not environment variables).'

inputs:
  token:
    description: 'Cloudflare API token'
    required: true
  account:
    description: 'Cloudflare account ID'
    required: true
  cwd:
    description: 'Directory containing wrangler.toml'
    required: false
    default: '.'
  env:
    description: 'wrangler --env value. Empty means run without --env.'
    required: false
    default: ''
  worker:
    description: 'Override the deployed script name (wrangler --name). Empty uses the config name.'
    required: false
    default: ''
  command:
    description: 'wrangler subcommand'
    required: false
    default: 'deploy'

outputs:
  versionId:
    description: 'Cloudflare version UUID from this deploy, parsed from wrangler output. Empty if not found.'
    value: ${{ steps.capture.outputs.versionId }}

runs:
  using: 'composite'
  steps:
    - name: Deploy
      id: deploy
      uses: cloudflare/wrangler-action@v4
      with:
        apiToken: ${{ inputs.token }}
        accountId: ${{ inputs.account }}
        workingDirectory: ${{ inputs.cwd }}
        environment: ${{ inputs.env }}
        command: ${{ inputs.worker == '' && inputs.command || format('{0} --name {1}', inputs.command, inputs.worker) }}

    - name: Capture version id
      id: capture
      shell: bash
      env:
        OUT: ${{ steps.deploy.outputs.command-output }}
      run: |
        set -euo pipefail
        vid=$(printf '%s' "$OUT" | grep -iE 'Version ID' | grep -oiE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -n1 || true)
        echo "versionId=${vid}" >> "$GITHUB_OUTPUT"
        if [ -n "$vid" ]; then
          echo "Captured version id: $vid"
        else
          echo "::warning::No version id found in deploy output; PR version-record will be skipped."
        fi

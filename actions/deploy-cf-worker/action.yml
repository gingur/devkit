name: 'Deploy Cloudflare Worker'
description: 'Run wrangler against a pre-built directory via cloudflare/wrangler-action@v4. Cloudflare credentials are passed as inputs (v4 takes them via inputs, not environment variables).'

inputs:
  api-token:
    description: 'Cloudflare API token'
    required: true
  account-id:
    description: 'Cloudflare account ID'
    required: true
  working-directory:
    description: 'Directory containing wrangler.toml'
    required: false
    default: '.'
  environment:
    description: 'wrangler --env value. Empty means run without --env.'
    required: false
    default: ''
  command:
    description: 'wrangler subcommand'
    required: false
    default: 'deploy'

outputs:
  command-output:
    description: "wrangler stdout (forwarded from wrangler-action)"
    value: ${{ steps.deploy.outputs.command-output }}
  command-stderr:
    description: "wrangler stderr (forwarded from wrangler-action)"
    value: ${{ steps.deploy.outputs.command-stderr }}
  deployment-url:
    description: "Deployment URL, when the command was a deploy"
    value: ${{ steps.deploy.outputs.deployment-url }}

runs:
  using: 'composite'
  steps:
    - name: Deploy
      id: deploy
      uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4
      with:
        apiToken: ${{ inputs.api-token }}
        accountId: ${{ inputs.account-id }}
        workingDirectory: ${{ inputs.working-directory }}
        environment: ${{ inputs.environment }}
        command: ${{ inputs.command }}

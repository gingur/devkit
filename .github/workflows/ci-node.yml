name: Node CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version (optional override). Empty means read from .nvmrc.'
        type: string
        required: false
        default: ''
      pnpm-version:
        description: 'pnpm version (optional override). Empty means read from packageManager field.'
        type: string
        required: false
        default: ''
      working-directory:
        description: 'Directory containing package.json'
        type: string
        required: false
        default: '.'
      lint-script:
        description: 'pnpm script to run for lint'
        type: string
        required: false
        default: 'lint'
      typecheck-script:
        description: 'pnpm script to run for typecheck'
        type: string
        required: false
        default: 'typecheck'
      test-script:
        description: 'pnpm script to run for tests'
        type: string
        required: false
        default: 'test'
      runs-on:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ${{ inputs.runs-on }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: gingur/devkit/actions/setup-node-pnpm@main
        with:
          node-version: ${{ inputs.node-version }}
          pnpm-version: ${{ inputs.pnpm-version }}

      - name: Lint
        run: pnpm ${{ inputs.lint-script }}

      - name: Typecheck
        run: pnpm ${{ inputs.typecheck-script }}

      - name: Test
        run: pnpm ${{ inputs.test-script }}

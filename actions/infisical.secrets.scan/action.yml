# actions/infisical.secrets.scan/action.yml
name: 'Infisical secret scan'
description: 'Install the Infisical CLI and scan the event commit range for leaked secrets (gitleaks engine). Local-only; no Infisical auth required.'

inputs:
  config:
    description: 'Path to an infisical-scan.toml. Empty uses the config bundled with devkit.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Install Infisical CLI
      shell: bash
      run: |
        curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
        sudo apt-get update && sudo apt-get install -y infisical

    - name: Scan
      shell: bash
      env:
        EVENT: ${{ github.event_name }}
        PR_BASE: ${{ github.event.pull_request.base.sha }}
        PR_HEAD: ${{ github.event.pull_request.head.sha }}
        PUSH_BEFORE: ${{ github.event.before }}
        SHA: ${{ github.sha }}
        CONFIG_IN: ${{ inputs.config }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        set -euo pipefail
        config="$CONFIG_IN"
        [ -z "$config" ] && config="${ACTION_PATH}/../../configs/infisical-scan.toml"

        if [ "$EVENT" = "pull_request" ]; then
          base="$PR_BASE"; head="$PR_HEAD"
        else
          base="$PUSH_BEFORE"; head="$SHA"
          [ "$base" = "0000000000000000000000000000000000000000" ] && base=""
        fi

        if [ -n "$base" ]; then
          log_opts="${base}..${head}"
        else
          log_opts="-1 ${head}"   # new branch / no base: scan only the latest commit
        fi

        echo "Scanning range: ${log_opts}  (config: ${config})"
        infisical scan --log-opts="$log_opts" --config "$config" --redact --no-color

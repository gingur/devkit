name: 'Claude implementation turn'
description: 'One implementation turn on the triggering claude-task issue: reconcile state, implement on the work branch, verify, open or update a draft PR. Requires CLAUDE_CODE_OAUTH_TOKEN and GH_BOT_PAT in env (use infisical.secrets.fetch first). Billed to the Claude Max subscription.'

inputs:
  bot:
    description: 'Machine-user login the workflow triggers on (the agent identity)'
    required: false
    default: 'gingur-bot'
  turns:
    description: 'Max agent turns per run (cost bound)'
    required: false
    default: '100'
  model:
    description: 'Model (claude --model value). Implementation defaults to the strongest tier; empty falls back to the account default.'
    required: false
    default: 'fable'

runs:
  using: 'composite'
  steps:
    - name: Instructions
      id: instructions
      shell: bash
      run: |
        # claude.agent.md -> system prompt via claude_args: escape for the
        # double-quoted shell-quote value it gets embedded in (backslashes,
        # then quotes, then "$" — claude-code-action's shell-quote parse runs
        # env-less, so an unescaped $WORD would be substituted with empty
        # string). The file must contain no line starting with "#" (stripped
        # by CCA).
        {
          echo 'AGENT_MD<<EOF_9c4e1b'
          sed -e 's/\\/\\\\/g' -e 's/"/\\"/g' -e 's/\$/\\$/g' "${GITHUB_ACTION_PATH}/../claude.agent.md"
          echo 'EOF_9c4e1b'
          echo 'TASK_MD<<EOF_9c4e1b'
          cat "${GITHUB_ACTION_PATH}/prompt.md"
          echo 'EOF_9c4e1b'
        } >> "$GITHUB_ENV"

    - name: Implement
      uses: anthropics/claude-code-action@v1
      env:
        GH_TOKEN: ${{ env.GH_BOT_PAT }}
      with:
        claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
        github_token: ${{ env.GH_BOT_PAT }}
        prompt: |
          Run context:
          - Repository: ${{ github.repository }}
          - Task issue: #${{ github.event.issue.number }}
          - Your bot login: ${{ inputs.bot }}
          - Operator (the human this turn): ${{ github.event.sender.login != inputs.bot && github.event.sender.login || github.repository_owner }}
          - Turn budget: ${{ inputs.turns }} agent turns (the --max-turns hard cap)
          - Work branch: claude/task-${{ github.event.issue.number }}

          ${{ env.TASK_MD }}
        claude_args: |
          --dangerously-skip-permissions
          --max-turns ${{ inputs.turns }}
          ${{ inputs.model && format('--model {0}', inputs.model) || '' }}
          --append-system-prompt "${{ env.AGENT_MD }}"

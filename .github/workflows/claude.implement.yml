name: Implement
# run-name carries both correlation tokens for the hooks service
# (workflow_run.display_title): `[d:<uuid>]` is the primary token — the
# dispatch-ledger key for service-dispatched runs — and `#N` stays as the
# human display plus the hooks legacy fallback for manual `gh workflow run`
# dispatches. This run-name covers only devkit's own direct dispatch runs —
# consumer callers set their own.
run-name: "Implement #${{ inputs.issue }}${{ inputs.dispatch && format(' [d:{0}]', inputs.dispatch) || '' }}"

on:
  workflow_dispatch:
    inputs:
      issue:
        description: 'Task issue number the turn acts on'
        type: string
        required: true
      dispatch:
        description: 'Hooks-service dispatch id, surfaced in run-name for run correlation'
        type: string
        required: false
        default: ''
      operator:
        description: 'Human login for handoff; empty falls back to the event sender'
        type: string
        required: false
        default: ''
  workflow_call:
    inputs:
      issue:
        description: 'Task issue number the turn acts on'
        type: string
        required: true
      dispatch:
        description: 'Hooks-service dispatch id, surfaced in run-name for run correlation'
        type: string
        required: false
        default: ''
      operator:
        description: 'Human login for handoff; empty falls back to the event sender'
        type: string
        required: false
        default: ''
      bot:
        description: 'Machine-user login the agent runs as (the agent identity)'
        type: string
        required: false
        default: 'gingur-bot'
      turns:
        description: 'Max agent turns per run'
        type: string
        required: false
        default: '100'
      model:
        description: 'Model (claude --model value). Implementation defaults to Sonnet; empty falls back to the account default.'
        type: string
        required: false
        default: 'sonnet'
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug'
        type: string
        required: false
        default: 'gingur'
      infisicalEnv:
        description: 'Infisical environment slug'
        type: string
        required: false
        default: 'preview'
      infisicalPath:
        description: 'Infisical secret folder path'
        type: string
        required: false
        default: '/infra/github'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: implement-${{ inputs.issue }}
  cancel-in-progress: false

jobs:
  implement:
    name: 'Implement ${{ github.event.repository.name }}#${{ inputs.issue }}'
    # No admission gate here: this workflow is compute plane only. The hooks
    # service gates admission before dispatching, and workflow_dispatch
    # requires write access — the same trust bar the retired assignment
    # trigger had.
    # vars.RUNNER covers devkit's own direct workflow_dispatch runs; in
    # workflow_call mode vars resolves against the calling repo, so callers
    # must pass `runner` explicitly.
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    env:
      ISSUE: ${{ inputs.issue }}
      # The hooks service dispatches via the bot PAT, so the sender can be
      # the bot itself — fall back to the repo owner as the operator.
      OPERATOR: ${{ inputs.operator || (github.event.sender.login != (inputs.bot || 'gingur-bot') && github.event.sender.login || github.repository_owner) }}
    steps:
      # Secrets first so env.GH_BOT_PAT is available to the checkout below.
      - name: Secrets
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity || vars.INFISICAL_IDENTITY }}
          project: ${{ inputs.infisicalProject || 'gingur' }}
          env: ${{ inputs.infisicalEnv || 'preview' }}
          path: ${{ inputs.infisicalPath || '/infra/github' }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Persist the write-capable bot PAT as git's credential — NOT the
          # read-only ephemeral GITHUB_TOKEN checkout persists by default (this
          # job is `contents: read`). Without this, the implement turn's branch
          # push authenticates as the read-only token and 403s, even though the
          # PAT (used by `gh`) reports push access. The persisted header wins
          # over any remote-URL token the claude action sets, so it must be the
          # PAT here.
          token: ${{ env.GH_BOT_PAT }}

      - name: Implement
        uses: gingur/devkit/actions/claude.implement@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          turns: ${{ inputs.turns || '100' }}
          model: ${{ inputs.model || 'sonnet' }}
          issue: ${{ env.ISSUE }}
          operator: ${{ env.OPERATOR }}

      - name: Handoff
        if: always()
        uses: gingur/devkit/actions/claude.handoff@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          operator: ${{ env.OPERATOR }}
          issue: ${{ env.ISSUE }}
          status: ${{ job.status }}
          turn: Implementation
          panel: |
            🎛️ **Your move** — reply with feedback to request changes (your reply starts my next turn automatically), or review and merge the PR. Prefix a comment with `[hold]` to comment without starting a turn.

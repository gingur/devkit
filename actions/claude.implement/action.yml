name: 'Claude implementation turn'
description: 'One implementation turn on a claude-task issue: reconcile state, implement on the work branch, verify, open or update a draft PR. Requires CLAUDE_CODE_OAUTH_TOKEN and GH_BOT_PAT in env (use infisical.secrets.fetch first). Billed to the Claude Max subscription.'

inputs:
  bot:
    description: 'Machine-user login the workflow triggers on (the agent identity)'
    required: false
    default: 'gingur-bot'
  author:
    description: "Login the agent's commits are authored as (git blame owner)"
    required: false
    default: 'gingur'
  turns:
    description: 'Max agent turns per run (cost bound)'
    required: false
    default: '100'
  model:
    description: 'Model (claude --model value). Implementation defaults to the strongest tier; empty falls back to the account default.'
    required: false
    default: 'sonnet'
  issue:
    description: 'Task issue number the turn acts on'
    required: true
  operator:
    description: 'Human login this turn serves; empty falls back to the event sender (repo owner when the sender is the bot)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Instructions
      id: instructions
      shell: bash
      env:
        GH_TOKEN: ${{ env.GH_BOT_PAT }}
        AUTHOR: ${{ inputs.author }}
      run: |
        # Commits are authored by the operator account (bot_id/bot_name below
        # map to the author, not claude-code-action's github-actions default)
        # and committed by the bot (GIT_COMMITTER_* in the Implement step).
        # Resolved at run time so the id can never desync from the login.
        echo "AUTHOR_ID=$(gh api "users/$AUTHOR" --jq .id)" >> "$GITHUB_ENV"
        # Emits AGENT_MD/TASK_MD/TURN_STARTED/CLAUDE_EXEC — rationale in claude.lib/turn.sh.
        . "${GITHUB_ACTION_PATH}/../claude.lib/turn.sh"
        turn_instructions TASK_MD

    - name: Implement
      uses: anthropics/claude-code-action@v1
      env:
        GH_TOKEN: ${{ env.GH_BOT_PAT }}
        GIT_COMMITTER_NAME: ${{ inputs.bot }}
        GIT_COMMITTER_EMAIL: 301771478+gingur-bot@users.noreply.github.com
      with:
        claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
        github_token: ${{ env.GH_BOT_PAT }}
        bot_id: ${{ env.AUTHOR_ID }}
        bot_name: ${{ inputs.author }}
        path_to_claude_code_executable: ${{ env.CLAUDE_EXEC }}
        prompt: |
          Run context:
          - Repository: ${{ github.repository }}
          - Task issue: #${{ inputs.issue }}
          - Your bot login: ${{ inputs.bot }}
          - Operator (the human this turn): ${{ inputs.operator || (github.event.sender.login != inputs.bot && github.event.sender.login || github.repository_owner) }}
          - Turn budget: ${{ inputs.turns }} agent turns (the --max-turns hard cap)
          - Work branch: claude/task-${{ inputs.issue }}

          ${{ env.TASK_MD }}
        claude_args: |
          --dangerously-skip-permissions
          --max-turns ${{ inputs.turns }}
          ${{ inputs.model && format('--model {0}', inputs.model) || '' }}
          --append-system-prompt "${{ env.AGENT_MD }}"

    - name: Verify
      env:
        GH_TOKEN: ${{ github.token }}
        ISSUE: ${{ inputs.issue }}
        REPO: ${{ github.repository }}
        BOT: ${{ inputs.bot }}
      shell: bash
      run: |
        # Comment-contract check — rationale in claude.lib/turn.sh.
        . "${GITHUB_ACTION_PATH}/../claude.lib/turn.sh"
        turn_verify

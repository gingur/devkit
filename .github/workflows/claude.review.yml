name: Review
# run-name carries both correlation tokens for the hooks service
# (workflow_run.display_title): `[d:<uuid>]` is the primary token — the
# dispatch-ledger key for service-dispatched runs — and `#N` stays as the
# human display plus the hooks legacy fallback for manual `gh workflow run`
# dispatches. This run-name covers only devkit's own direct dispatch runs —
# consumer callers set their own.
run-name: "Review #${{ inputs.pr }}${{ inputs.dispatch && format(' [d:{0}]', inputs.dispatch) || '' }}"

on:
  workflow_dispatch:
    inputs:
      pr:
        description: 'Pull request number the turn reviews'
        type: string
        required: true
      dispatch:
        description: 'Hooks-service dispatch id, surfaced in run-name for run correlation'
        type: string
        required: false
        default: ''
      operator:
        description: 'Human login for handoff; empty falls back to the event sender'
        type: string
        required: false
        default: ''
  workflow_call:
    inputs:
      pr:
        description: 'Pull request number the turn reviews'
        type: string
        required: true
      dispatch:
        description: 'Hooks-service dispatch id, surfaced in run-name for run correlation'
        type: string
        required: false
        default: ''
      operator:
        description: 'Human login for handoff; empty falls back to the event sender'
        type: string
        required: false
        default: ''
      bot:
        description: 'Machine-user login the agent runs as (the agent identity)'
        type: string
        required: false
        default: 'gingur-bot'
      turns:
        description: 'Max agent turns per run'
        type: string
        required: false
        default: '50'
      model:
        description: 'Model (claude --model value). Review defaults to the strongest tier; empty falls back to the account default.'
        type: string
        required: false
        default: 'fable'
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug'
        type: string
        required: false
        default: 'gingur'
      infisicalEnv:
        description: 'Infisical environment slug'
        type: string
        required: false
        default: 'preview'
      infisicalPath:
        description: 'Infisical secret folder path'
        type: string
        required: false
        default: '/infra/github'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: review-${{ inputs.pr }}
  cancel-in-progress: false

jobs:
  review:
    name: 'Review ${{ github.event.repository.name }}#${{ inputs.pr }}'
    # No admission gate here: this workflow is compute plane only — no intake
    # or cycle logic (that's gingur/hooks). The hooks service gates admission
    # before dispatching, and workflow_dispatch requires write access — the
    # same trust bar the retired assignment trigger had. The Resolve step
    # still re-derives the safety guards from API truth before checkout,
    # because they protect secrets.
    # vars.RUNNER covers devkit's own direct workflow_dispatch runs; in
    # workflow_call mode vars resolves against the calling repo, so callers
    # must pass `runner` explicitly.
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      PR: ${{ inputs.pr }}
      # The hooks service dispatches via the bot PAT, so the sender can be
      # the bot itself — fall back to the repo owner as the operator.
      OPERATOR: ${{ inputs.operator || (github.event.sender.login != (inputs.bot || 'gingur-bot') && github.event.sender.login || github.repository_owner) }}
    steps:
      # Dispatch mode has no pull_request payload, so the head ref/SHA must
      # be resolved via API — and the safety guards (open draft, same-repo,
      # bot-authored, claude/task-* head) are derived from that same API
      # truth, hard-failing before checkout and before any secret use beyond
      # github.token. They live server-side because they protect secrets from
      # checking out untrusted fork code — dispatch inputs are not trusted
      # for this. This is secrets-safety, not admission logic (which stays in
      # gingur/hooks).
      - name: Resolve
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          BOT: ${{ inputs.bot || 'gingur-bot' }}
        shell: bash
        run: |
          pr=$(gh pr view "$PR" --repo "$REPO" \
            --json headRefName,headRefOid,isDraft,state,isCrossRepository,author)
          state=$(jq -r '.state' <<< "$pr")
          draft=$(jq -r '.isDraft' <<< "$pr")
          cross=$(jq -r '.isCrossRepository' <<< "$pr")
          author=$(jq -r '.author.login' <<< "$pr")
          headRef=$(jq -r '.headRefName' <<< "$pr")
          fail=0
          [[ "$state" == 'OPEN' ]] || { echo "::error::PR #$PR state is '$state', need OPEN"; fail=1; }
          [[ "$draft" == 'true' ]] || { echo "::error::PR #$PR isDraft is '$draft', need true"; fail=1; }
          [[ "$cross" == 'false' ]] || { echo "::error::PR #$PR isCrossRepository is '$cross', need false"; fail=1; }
          [[ "$author" == "$BOT" ]] || { echo "::error::PR #$PR author is '$author', need '$BOT'"; fail=1; }
          [[ "$headRef" == claude/task-* ]] || { echo "::error::PR #$PR headRefName is '$headRef', need claude/task-*"; fail=1; }
          [[ "$fail" -eq 0 ]] || exit 1
          {
            echo "headRef=$headRef"
            echo "headSha=$(jq -r '.headRefOid' <<< "$pr")"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Review the PR head itself — findings must match the reviewed SHA.
          ref: ${{ steps.resolve.outputs.headSha }}

      - name: Secrets
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity || vars.INFISICAL_IDENTITY }}
          project: ${{ inputs.infisicalProject || 'gingur' }}
          env: ${{ inputs.infisicalEnv || 'preview' }}
          path: ${{ inputs.infisicalPath || '/infra/github' }}

      - name: Review
        uses: gingur/devkit/actions/claude.review@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          turns: ${{ inputs.turns || '50' }}
          model: ${{ inputs.model || 'fable' }}
          pr: ${{ env.PR }}
          headRef: ${{ steps.resolve.outputs.headRef }}
          headSha: ${{ steps.resolve.outputs.headSha }}
          operator: ${{ env.OPERATOR }}

      - name: Handoff
        if: always()
        uses: gingur/devkit/actions/claude.handoff@main
        with:
          # PRs are issues to the assignee/comment APIs — hand off on the PR.
          issue: ${{ env.PR }}
          bot: ${{ inputs.bot || 'gingur-bot' }}
          operator: ${{ env.OPERATOR }}
          status: ${{ job.status }}
          turn: Review
          # No panel: action panels live on ask/task issues only.

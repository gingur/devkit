name: 'Cloudflare Worker custom domain'
description: 'Attach or detach a Workers custom domain via the Cloudflare API. Auto-manages the proxied DNS record + edge cert. Needs a token with Workers Routes + DNS edit.'

inputs:
  mode:
    description: 'attach | detach'
    required: true
  token:
    description: 'Cloudflare API token'
    required: true
  account:
    description: 'Cloudflare account ID'
    required: true
  zone:
    description: 'Cloudflare zone ID for the domain'
    required: true
  hostname:
    description: 'Hostname to bind, e.g. pr-42.example.com'
    required: true
  service:
    description: 'Worker script name to bind (the CF API field is "service"). Used by attach.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Manage custom domain
      shell: bash
      env:
        CF_API_TOKEN: ${{ inputs.token }}
        ACCOUNT_ID: ${{ inputs.account }}
        ZONE_ID: ${{ inputs.zone }}
        HOSTNAME: ${{ inputs.hostname }}
        SERVICE: ${{ inputs.service }}
        MODE: ${{ inputs.mode }}
      run: |
        set -euo pipefail
        api="https://api.cloudflare.com/client/v4/accounts/${ACCOUNT_ID}/workers/domains"
        auth=(-H "Authorization: Bearer ${CF_API_TOKEN}" -H "Content-Type: application/json")

        # Run a CF API call; success is the HTTP status (2xx), not a body field —
        # DELETE returns 204 with an empty body. Sets BODY; surfaces the real
        # error body on any non-2xx.
        cf() {
          local out status
          out=$(curl -sS -w '\n%{http_code}' "${auth[@]}" "$@")
          status=${out##*$'\n'}; BODY=${out%$'\n'*}
          if [ "${status:0:1}" != "2" ]; then
            echo "::error::Cloudflare API ${status}:"; printf '%s\n' "$BODY"; exit 1
          fi
        }

        case "$MODE" in
          attach)
            cf -X PUT "$api" \
              --data "$(jq -n --arg h "$HOSTNAME" --arg s "$SERVICE" --arg z "$ZONE_ID" \
                        '{hostname:$h, service:$s, zone_id:$z}')"
            echo "Attached $HOSTNAME -> $SERVICE"
            ;;
          detach)
            cf -G "$api" --data-urlencode "hostname=${HOSTNAME}" --data-urlencode "zone_id=${ZONE_ID}"
            id=$(printf '%s' "$BODY" | jq -r '.result[0].id // empty')
            if [ -z "$id" ]; then echo "No domain binding for $HOSTNAME — nothing to detach."; exit 0; fi
            cf -X DELETE "$api/$id"
            echo "Detached $HOSTNAME (id=$id)"
            ;;
          *)
            echo "::error::mode must be attach or detach (got '$MODE')"; exit 1 ;;
        esac

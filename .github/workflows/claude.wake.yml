name: Wake

on:
  issue_comment:
    types: [created, edited]
  workflow_call:
    inputs:
      bot:
        description: 'Machine-user login to assign (the agent identity the wake starts)'
        type: string
        required: false
        default: 'gingur-bot'
      quiet:
        description: 'Debounce quiet period in seconds — each qualifying event restarts it'
        type: string
        required: false
        default: '20'
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug'
        type: string
        required: false
        default: 'gingur'
      infisicalEnv:
        description: 'Infisical environment slug'
        type: string
        required: false
        default: 'prod'
      infisicalPath:
        description: 'Infisical secret folder path'
        type: string
        required: false
        default: '/infra/github'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  id-token: write

concurrency:
  group: wake-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  wake:
    # Only trusted event shapes start (paid) turns on this public repo:
    # - created: a human with repo write (author_association is computed
    #   server-side; CONTRIBUTOR/NONE deliberately excluded) commenting on an
    #   enrolled open issue, unless prefixed [hold] (comment without waking).
    # - edited: a checkbox tick in a bot-authored action panel. No association
    #   check needed — only users with write access can edit another user's
    #   comment; author == bot + the panel marker restricts it to panels;
    #   requiring "- [x] " ignores untick-only edits; the Submit clause arms
    #   multi-select panels only once their final **Submit** box is ticked.
    # Top-level sender != bot keeps the agent's own PAT-authored posts/edits
    # (which do fire events) from self-triggering.
    if: >-
      !github.event.issue.pull_request
      && github.event.issue.state == 'open'
      && (contains(github.event.issue.labels.*.name, 'claude-ask')
        || contains(github.event.issue.labels.*.name, 'claude-task'))
      && github.event.sender.login != (inputs.bot || 'gingur-bot')
      && ((github.event.action == 'created'
          && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
          && !startsWith(github.event.comment.body, '[hold]'))
        || (github.event.action == 'edited'
          && github.event.comment.user.login == (inputs.bot || 'gingur-bot')
          && contains(github.event.comment.body, '<!-- claude:action-panel -->')
          && contains(github.event.comment.body, '- [x] ')
          && (!contains(github.event.comment.body, '**Submit**')
            || contains(github.event.comment.body, '- [x] **Submit**'))))
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 5
    steps:
      - name: Secrets
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity || vars.INFISICAL_IDENTITY }}
          project: ${{ inputs.infisicalProject || 'gingur' }}
          env: ${{ inputs.infisicalEnv || 'prod' }}
          path: ${{ inputs.infisicalPath || '/infra/github' }}

      # Immediate feedback before the debounce: 👀 on the triggering comment
      # shows the request was seen. Bot-authored (PAT) so the turn-end handoff
      # can find and remove exactly the bot's own reactions. Best-effort; a
      # canceled (superseded) wake's leftover 👀 is swept by the same handoff.
      - name: Ack
        env:
          GH_TOKEN: ${{ env.GH_BOT_PAT }}
          COMMENT: ${{ github.event.comment.id }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          [[ -z "$GH_TOKEN" ]] && { echo 'GH_BOT_PAT absent — skipping ack'; exit 0; }
          gh api "repos/$REPO/issues/comments/$COMMENT/reactions" \
            -f content=eyes --silent || true

      # cancel-in-progress + this sleep debounce bursts (multi-box panels,
      # reply-then-tick): each new qualifying event cancels the pending wake
      # and restarts the quiet timer, so only the final state assigns.
      - name: Debounce
        shell: bash
        run: sleep ${{ inputs.quiet || '20' }}

      - name: Wake
        env:
          GH_TOKEN: ${{ env.GH_BOT_PAT }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          BOT: ${{ inputs.bot || 'gingur-bot' }}
        shell: bash
        run: |
          # The PAT (not github.token) so the assigned event triggers the agent
          # workflows. Remove-then-add so it fires even when the bot is already
          # assigned (comment landed mid-turn); the agent workflows' per-issue
          # concurrency queues the extra turn instead of losing it.
          gh issue edit "$ISSUE" --repo "$REPO" --remove-assignee "$BOT"
          gh issue edit "$ISSUE" --repo "$REPO" --add-assignee "$BOT"

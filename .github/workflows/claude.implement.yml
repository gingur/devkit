name: Implement

on:
  issues:
    types: [assigned]
  workflow_call:
    inputs:
      bot:
        description: 'Machine-user login that triggers a turn when assigned'
        type: string
        required: false
        default: 'gingur-bot'
      turns:
        description: 'Max agent turns per run'
        type: string
        required: false
        default: '100'
      model:
        description: 'Model (claude --model value). Implementation defaults to the strongest tier; empty falls back to the account default.'
        type: string
        required: false
        default: 'fable'
      infisicalIdentity:
        description: 'Infisical machine identity UUID with OIDC trust for this repo'
        type: string
        required: false
        default: ''
      infisicalProject:
        description: 'Infisical project slug'
        type: string
        required: false
        default: 'gingur'
      infisicalEnv:
        description: 'Infisical environment slug'
        type: string
        required: false
        default: 'prod'
      infisicalPath:
        description: 'Infisical secret folder path'
        type: string
        required: false
        default: '/infra/github'
      runner:
        description: 'Runner label'
        type: string
        required: false
        default: 'ubuntu-latest'

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: implement-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  implement:
    name: "Implement ${{ github.event.repository.name }}#${{ github.event.issue.number }}: ${{ github.event.issue.title }}"
    if: github.event.assignee.login == (inputs.bot || 'gingur-bot') && contains(github.event.issue.labels.*.name, 'claude-task')
    # vars.RUNNER fallback: the direct issues:assigned trigger has no caller to
    # pass inputs; in workflow_call mode vars resolves against the calling repo.
    runs-on: ${{ inputs.runner || vars.RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Secrets
        uses: gingur/devkit/actions/infisical.secrets.fetch@main
        with:
          identity: ${{ inputs.infisicalIdentity || vars.INFISICAL_IDENTITY }}
          project: ${{ inputs.infisicalProject || 'gingur' }}
          env: ${{ inputs.infisicalEnv || 'prod' }}
          path: ${{ inputs.infisicalPath || '/infra/github' }}

      - name: Implement
        uses: gingur/devkit/actions/claude.implement@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          turns: ${{ inputs.turns || '100' }}
          model: ${{ inputs.model || 'fable' }}

      - name: Handoff
        if: always()
        uses: gingur/devkit/actions/claude.handoff@main
        with:
          bot: ${{ inputs.bot || 'gingur-bot' }}
          # Wake assigns via the bot PAT, so sender can be the bot itself —
          # fall back to the repo owner as the operator.
          operator: ${{ github.event.sender.login != (inputs.bot || 'gingur-bot') && github.event.sender.login || github.repository_owner }}
          status: ${{ job.status }}
          turn: Implementation
          panel: |
            🎛️ **Your move** — reply with feedback to request changes (your reply starts my next turn automatically), or review and merge the PR. Prefix a comment with `[hold]` to comment without starting a turn.

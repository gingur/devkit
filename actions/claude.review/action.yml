name: 'Claude review turn'
description: 'One review turn on a bot-authored draft PR: reconcile PR + task state, review the diff against the task acceptance criteria and repo standards, then submit exactly one COMMENT review: blocking findings (PR stays draft) or an LGTM pass (then mark the PR ready and request the operator review). Requires CLAUDE_CODE_OAUTH_TOKEN and GH_BOT_PAT in env (use infisical.secrets.fetch first). Billed to the Claude Max subscription.'

inputs:
  bot:
    description: 'Machine-user login the workflow triggers on (the agent identity)'
    required: false
    default: 'gingur-bot'
  turns:
    description: 'Max agent turns per run (cost bound)'
    required: false
    default: '50'
  model:
    description: 'Model (claude --model value). Review defaults to the strongest tier; empty falls back to the account default.'
    required: false
    default: 'fable'
  pr:
    description: 'Pull request number the turn reviews'
    required: false
    default: ${{ github.event.pull_request.number }}
  headRef:
    description: 'PR head branch name (the claude/task-<n> work branch the task number derives from)'
    required: false
    default: ${{ github.event.pull_request.head.ref }}
  headSha:
    description: 'PR head commit SHA (the one checked out in the workspace)'
    required: false
    default: ${{ github.event.pull_request.head.sha }}
  operator:
    description: 'Human login this turn serves; empty falls back to the event sender (repo owner when the sender is the bot)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Instructions
      id: instructions
      shell: bash
      env:
        HEAD_REF: ${{ inputs.headRef }}
      run: |
        # Emits AGENT_MD/TASK_MD/TURN_STARTED/CLAUDE_EXEC — rationale in claude.lib/turn.sh.
        . "${GITHUB_ACTION_PATH}/../claude.lib/turn.sh"
        turn_instructions TASK_MD
        # TASK derives the task issue number from the work-branch convention
        # claude/task-<n> (guarded by the workflow's startsWith).
        echo "TASK=${HEAD_REF#claude/task-}" >> "$GITHUB_ENV"

    - name: Review
      uses: anthropics/claude-code-action@v1
      env:
        GH_TOKEN: ${{ env.GH_BOT_PAT }}
      with:
        claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
        github_token: ${{ env.GH_BOT_PAT }}
        path_to_claude_code_executable: ${{ env.CLAUDE_EXEC }}
        prompt: |
          Run context:
          - Repository: ${{ github.repository }}
          - Pull request: #${{ inputs.pr }} (branch ${{ inputs.headRef }}, head SHA ${{ inputs.headSha }} — checked out in the workspace)
          - Task issue: #${{ env.TASK }}
          - Your bot login: ${{ inputs.bot }}
          - Operator (the human this turn): ${{ inputs.operator || (github.event.sender.login != inputs.bot && github.event.sender.login || github.repository_owner) }}
          - Turn budget: ${{ inputs.turns }} agent turns (the --max-turns hard cap)

          ${{ env.TASK_MD }}
        claude_args: |
          --dangerously-skip-permissions
          --max-turns ${{ inputs.turns }}
          ${{ inputs.model && format('--model {0}', inputs.model) || '' }}
          --append-system-prompt "${{ env.AGENT_MD }}"

    # The reviewer's contract is one verdict per turn: a submitted COMMENT
    # review (both verdict paths) or a PR comment (moot PR / blocker report).
    # A run that "succeeds" silently burns real quota with the operator none
    # the wiser — fail the job instead, so the handoff posts the failure
    # comment and returns the baton.
    - name: Verify
      env:
        GH_TOKEN: ${{ github.token }}
        PR: ${{ inputs.pr }}
        REPO: ${{ github.repository }}
        BOT: ${{ inputs.bot }}
      shell: bash
      run: |
        r=$(gh api "repos/$REPO/pulls/$PR/reviews" --paginate \
          --jq "[.[] | select(.user.login == \"$BOT\" and .submitted_at >= \"$TURN_STARTED\")] | length")
        c=$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
          --jq "[.[] | select(.user.login == \"$BOT\" and .created_at >= \"$TURN_STARTED\")] | length")
        if [[ "$r" -eq 0 && "$c" -eq 0 ]]; then
          echo "::error::review turn ended without posting a PR review or comment (contract: one verdict per turn)"
          exit 1
        fi
